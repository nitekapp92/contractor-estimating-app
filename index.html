<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contractor Platform V8</title>

<style>

body{
font-family:Arial;
background:#eef1f5;
padding:20px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.container{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
}

button{
padding:12px;
width:100%;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
}

.project{
border-bottom:1px solid #ddd;
padding:10px 0;
}

</style>

</head>

<body>

<h2>Contractor Business Platform V8</h2>

<div class="dashboard">

<div class="card">
<b>Total Projects</b>
<div id="dashProjects"></div>
</div>

<div class="card">
<b>Total Revenue</b>
<div id="dashRevenue"></div>
</div>

<div class="card">
<b>Total Profit</b>
<div id="dashProfit"></div>
</div>

<div class="card">
<b>Active Projects</b>
<div id="dashActive"></div>
</div>

</div>

<div class="container">

<h3>Estimate Builder</h3>

<label>Client</label>
<input id="client">

<label>Project Name</label>
<input id="project">

<label>Status</label>
<select id="status">
<option>Estimate</option>
<option>Active</option>
<option>Completed</option>
</select>

<label>Region</label>
<select id="region">
<option value="1">National</option>
<option value="0.95">North Carolina</option>
<option value="0.93">South Carolina</option>
<option value="1.05">Florida</option>
</select>

<label>Base Cost / SF</label>
<input id="baseCost" value="60">

<label>Labor Hours / SF</label>
<input id="laborRate" value="0.6">

<label>Length</label>
<input id="length" type="number">

<label>Width</label>
<input id="width" type="number">

<label>Margin</label>
<input id="margin" type="number">

<button onclick="estimate()">Generate Estimate</button>

<div id="estimate"></div>

</div>

<div class="container">

<h3>Labor & Materials</h3>

<div id="labor"></div>

<div id="materials"></div>

<div id="supplier"></div>

</div>

<div class="container">

<h3>Task Manager</h3>

<input id="task" placeholder="Task">
<input id="date" type="date">

<button onclick="addTask()">Add Task</button>

<div id="schedule"></div>

</div>

<div class="container">

<h3>Subcontractors</h3>

<input id="subName" placeholder="Name">
<input id="subTrade" placeholder="Trade">
<input id="subBid" placeholder="Bid">

<button onclick="addSub()">Add Subcontractor</button>

<div id="subs"></div>

</div>

<div class="container">

<h3>Job Notes</h3>

<textarea id="notes"></textarea>

<h3>Project Photo</h3>

<input type="file" accept="image/*" capture="environment">

</div>

<div class="container">

<h3>Documents</h3>

<button onclick="proposal()">Download Proposal</button>
<button onclick="invoice()">Download Invoice</button>

</div>

<div class="container">

<h3>Project Portfolio</h3>

<button onclick="saveProject()">Save Project</button>

<div id="projects"></div>

</div>

<script>

let estimateData={}
let subs=[]
let tasks=[]

function estimate(){

let client=document.getElementById("client").value
let project=document.getElementById("project").value
let status=document.getElementById("status").value

let length=parseFloat(document.getElementById("length").value)
let width=parseFloat(document.getElementById("width").value)

let margin=parseFloat(document.getElementById("margin").value)

let region=parseFloat(document.getElementById("region").value)

let baseCost=parseFloat(document.getElementById("baseCost").value)

let laborRate=parseFloat(document.getElementById("laborRate").value)

let sf=length*width

let costPerSF=baseCost*region

let construction=sf*costPerSF

let contingency=construction*0.07

let overhead=528

let total=construction+contingency+overhead

let bid=total/(1-margin)

let profit=bid-total

estimateData={client,project,status,sf,bid,profit}

document.getElementById("estimate").innerHTML=

"Square Footage: "+sf+
"<br>Bid Price: $"+bid.toFixed(2)+
"<br>Profit: $"+profit.toFixed(2)

labor(sf,laborRate)

takeoff(length,width)

}

function labor(sf,rate){

let hours=sf*rate

document.getElementById("labor").innerHTML="Labor Hours: "+hours.toFixed(0)

}

function takeoff(length,width){

let perimeter=(length*2)+(width*2)

let studs=Math.round(perimeter/1.33)

let osb=Math.ceil((length*width)/32)

let concrete=((length*width)*0.037).toFixed(2)

let shingles=Math.ceil((length*width)/30)

document.getElementById("materials").innerHTML=

"Studs: "+studs+
"<br>OSB: "+osb+
"<br>Concrete CY: "+concrete+
"<br>Shingles: "+shingles

document.getElementById("supplier").innerHTML=

studs+" Studs"+
"<br>"+osb+" OSB"+
"<br>"+concrete+" CY Concrete"+
"<br>"+shingles+" Shingles"

}

function addSub(){

let name=document.getElementById("subName").value
let trade=document.getElementById("subTrade").value
let bid=document.getElementById("subBid").value

subs.push({name,trade,bid})

displaySubs()

}

function displaySubs(){

let html=""

subs.forEach(s=>{

html+="<div class='project'>"+s.name+" | "+s.trade+" | $"+s.bid+"</div>"

})

document.getElementById("subs").innerHTML=html

}

function addTask(){

let task=document.getElementById("task").value
let date=document.getElementById("date").value

tasks.push({task,date})

displaySchedule()

}

function displaySchedule(){

let html=""

tasks.forEach(t=>{

html+="<div class='project'>"+t.task+" - "+t.date+"</div>"

})

document.getElementById("schedule").innerHTML=html

}

function proposal(){

let p=estimateData

download("PROPOSAL\n\nClient: "+p.client+"\nProject: "+p.project+"\nBid: $"+p.bid)

}

function invoice(){

let p=estimateData

download("INVOICE\n\nClient: "+p.client+"\nProject: "+p.project+"\nAmount Due: $"+p.bid)

}

function download(text){

let blob=new Blob([text],{type:"text/plain"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="document.txt"

link.click()

}

function saveProject(){

let projects=JSON.parse(localStorage.getItem("projects")||"[]")

projects.push(estimateData)

localStorage.setItem("projects",JSON.stringify(projects))

loadProjects()

}

function loadProjects(){

let projects=JSON.parse(localStorage.getItem("projects")||"[]")

let html=""
let revenue=0
let profit=0
let active=0

projects.forEach(p=>{

revenue+=p.bid
profit+=p.profit

if(p.status=="Active") active++

html+="<div class='project'><b>"+p.project+"</b><br>"+p.client+"<br>"+p.status+"<br>$"+p.bid.toFixed(2)+"</div>"

})

document.getElementById("projects").innerHTML=html

document.getElementById("dashProjects").innerHTML=projects.length
document.getElementById("dashRevenue").innerHTML="$"+revenue.toFixed(0)
document.getElementById("dashProfit").innerHTML="$"+profit.toFixed(0)
document.getElementById("dashActive").innerHTML=active

}

loadProjects()

</script>

</body>

</html>
