<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contractor Platform V6</title>

<style>

body{
font-family:Arial;
background:#eef1f5;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
}

button{
padding:12px;
width:100%;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
}

.card{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.dashboard{
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h2>Contractor Business Platform V6</h2>

<label>Client</label>
<input id="client">

<label>Project</label>
<input id="project">

<label>Region</label>

<select id="region">
<option value="1">National Average</option>
<option value="0.95">North Carolina</option>
<option value="0.93">South Carolina</option>
<option value="1.05">Florida</option>
<option value="0.90">Texas</option>
</select>

<label>Length</label>
<input id="length" type="number">

<label>Width</label>
<input id="width" type="number">

<label>Profit Margin</label>
<input id="margin" type="number">

<button onclick="estimate()">Generate Estimate</button>

<div id="estimate"></div>

</div>

<div class="container">

<h3>Labor Estimate</h3>
<div id="labor"></div>

<h3>Material Takeoff</h3>
<div id="materials"></div>

<h3>Supplier Order</h3>
<div id="supplier"></div>

</div>

<div class="container">

<h3>Subcontractors</h3>

<input id="subName" placeholder="Name">
<input id="subTrade" placeholder="Trade">
<input id="subBid" placeholder="Bid">

<button onclick="addSub()">Add Sub</button>

<div id="subs"></div>

</div>

<div class="container">

<h3>Project Schedule</h3>

<input id="task" placeholder="Task">
<input id="date" type="date">

<button onclick="addTask()">Add Task</button>

<div id="schedule"></div>

</div>

<div class="container">

<h3>Job Notes</h3>
<textarea id="notes"></textarea>

<h3>Project Photo</h3>
<input type="file" accept="image/*" capture="environment">

</div>

<div class="container">

<h3>Invoice / Proposal</h3>

<button onclick="proposal()">Download Proposal</button>
<button onclick="invoice()">Download Invoice</button>

</div>

<div class="container">

<h3>Save Project</h3>

<button onclick="saveProject()">Save Project</button>

<h3>Projects</h3>

<div id="projects"></div>

</div>

<div class="container">

<h3>Business Dashboard</h3>

<div id="dashboard" class="dashboard"></div>

</div>

<script>

let estimateData={}
let subs=[]
let tasks=[]

function estimate(){

let client=document.getElementById("client").value
let project=document.getElementById("project").value

let length=parseFloat(document.getElementById("length").value)
let width=parseFloat(document.getElementById("width").value)

let margin=parseFloat(document.getElementById("margin").value)

let region=parseFloat(document.getElementById("region").value)

let sf=length*width

let baseCost=60

let costPerSF=baseCost*region

let construction=sf*costPerSF

let contingency=construction*0.07

let overhead=528

let total=construction+contingency+overhead

let bid=total/(1-margin)

let profit=bid-total

estimateData={client,project,sf,bid,profit}

document.getElementById("estimate").innerHTML=

"Square Footage: "+sf+
"<br>Construction Cost: $"+construction.toFixed(2)+
"<br>Total Cost: $"+total.toFixed(2)+
"<br>Bid Price: $"+bid.toFixed(2)+
"<br>Profit: $"+profit.toFixed(2)

labor(sf)

takeoff(length,width)

}

function labor(sf){

let hours=sf*0.6

document.getElementById("labor").innerHTML=

"Labor Hours: "+hours.toFixed(0)

}

function takeoff(length,width){

let perimeter=(length*2)+(width*2)

let studs=Math.round(perimeter/1.33)

let osb=Math.ceil((length*width)/32)

let concrete=((length*width)*0.037).toFixed(2)

let shingles=Math.ceil((length*width)/30)

document.getElementById("materials").innerHTML=

"Studs: "+studs+
"<br>OSB: "+osb+
"<br>Concrete CY: "+concrete+
"<br>Shingles: "+shingles

document.getElementById("supplier").innerHTML=

studs+" Studs"+
"<br>"+osb+" OSB Sheets"+
"<br>"+concrete+" CY Concrete"+
"<br>"+shingles+" Shingles"

}

function addSub(){

let name=document.getElementById("subName").value
let trade=document.getElementById("subTrade").value
let bid=document.getElementById("subBid").value

subs.push({name,trade,bid})

displaySubs()

}

function displaySubs(){

let html=""

subs.forEach(s=>{

html+=

"<div class='card'>"+
s.name+" | "+s.trade+" | $"+s.bid+
"</div>"

})

document.getElementById("subs").innerHTML=html

}

function addTask(){

let task=document.getElementById("task").value
let date=document.getElementById("date").value

tasks.push({task,date})

displaySchedule()

}

function displaySchedule(){

let html=""

tasks.forEach(t=>{

html+=

"<div class='card'>"+
t.task+" - "+t.date+
"</div>"

})

document.getElementById("schedule").innerHTML=html

}

function proposal(){

let p=estimateData

download(

"PROPOSAL\n\n"+
"Client: "+p.client+
"\nProject: "+p.project+
"\nBid Price: $"+p.bid
)

}

function invoice(){

let p=estimateData

download(

"INVOICE\n\n"+
"Client: "+p.client+
"\nProject: "+p.project+
"\nAmount Due: $"+p.bid
)

}

function download(text){

let blob=new Blob([text],{type:"text/plain"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="document.txt"

link.click()

}

function saveProject(){

let projects=JSON.parse(localStorage.getItem("projects")||"[]")

projects.push(estimateData)

localStorage.setItem("projects",JSON.stringify(projects))

loadProjects()

}

function loadProjects(){

let projects=JSON.parse(localStorage.getItem("projects")||"[]")

let html=""
let revenue=0
let profit=0

projects.forEach(p=>{

revenue+=p.bid
profit+=p.profit

html+=

"<div class='card'>"+
"<b>"+p.project+"</b><br>"+
p.client+
"<br>$"+p.bid.toFixed(2)+
"</div>"

})

document.getElementById("projects").innerHTML=html

document.getElementById("dashboard").innerHTML=

"Projects: "+projects.length+
"<br>Total Revenue: $"+revenue.toFixed(2)+
"<br>Total Profit: $"+profit.toFixed(2)

}

loadProjects()

</script>

</body>

</html>
