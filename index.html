<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contractor Estimating Platform V5</title>

<style>

body{
font-family:Arial;
background:#eef1f5;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
}

button{
padding:12px;
width:100%;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
}

.project{
border-bottom:1px solid #ddd;
padding:10px 0;
}

.dashboard{
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h2>Contractor Management Platform V5</h2>

<label>Client</label>
<input id="client">

<label>Project Name</label>
<input id="project">

<label>Region</label>

<select id="region">

<option value="1">National Average</option>
<option value="0.95">North Carolina</option>
<option value="0.93">South Carolina</option>
<option value="1.05">Florida</option>
<option value="0.9">Texas</option>

</select>

<label>Length (ft)</label>
<input id="length" type="number">

<label>Width (ft)</label>
<input id="width" type="number">

<label>Profit Margin</label>
<input id="margin" type="number">

<button onclick="estimate()">Generate Estimate</button>

<div id="estimate"></div>

</div>

<div class="container">

<h3>Material Takeoff</h3>

<div id="materials"></div>

<h3>Supplier Order List</h3>

<div id="supplier"></div>

</div>

<div class="container">

<h3>Subcontractor Management</h3>

<input id="subName" placeholder="Subcontractor Name">

<input id="subTrade" placeholder="Trade">

<input id="subBid" placeholder="Bid Amount">

<button onclick="addSub()">Add Subcontractor</button>

<div id="subs"></div>

</div>

<div class="container">

<h3>Job Schedule</h3>

<input id="scheduleTask" placeholder="Task">

<input id="scheduleDate" type="date">

<button onclick="addTask()">Add Task</button>

<div id="schedule"></div>

</div>

<div class="container">

<h3>Job Notes</h3>

<textarea id="notes"></textarea>

<h3>Jobsite Photo</h3>

<input type="file" accept="image/*" capture="environment">

</div>

<div class="container">

<h3>Invoice Generator</h3>

<button onclick="generateInvoice()">Generate Invoice</button>

</div>

<div class="container">

<h3>Save Project</h3>

<button onclick="saveProject()">Save Project</button>

<h3>Saved Projects</h3>

<div id="projects"></div>

</div>

<div class="container">

<h3>Business Dashboard</h3>

<div id="dashboard" class="dashboard"></div>

</div>

<script>

let estimateData={}
let subcontractors=[]
let schedule=[]

function estimate(){

let client=document.getElementById("client").value
let project=document.getElementById("project").value

let length=parseFloat(document.getElementById("length").value)
let width=parseFloat(document.getElementById("width").value)
let margin=parseFloat(document.getElementById("margin").value)

let region=parseFloat(document.getElementById("region").value)

let sf=length*width

let baseCost=60

let costPerSF=baseCost*region

let construction=sf*costPerSF

let contingency=construction*0.07

let overhead=528

let total=construction+contingency+overhead

let bid=total/(1-margin)

let profit=bid-total

estimateData={client,project,sf,bid,profit}

document.getElementById("estimate").innerHTML=

"Square Footage: "+sf+
"<br>Construction Cost: $"+construction.toFixed(2)+
"<br>Total Cost: $"+total.toFixed(2)+
"<br>Bid Price: $"+bid.toFixed(2)+
"<br>Profit: $"+profit.toFixed(2)

materialTakeoff(length,width)

}

function materialTakeoff(length,width){

let perimeter=(length*2)+(width*2)

let studs=Math.round(perimeter/1.33)

let osb=Math.ceil((length*width)/32)

let concrete=((length*width)*0.037).toFixed(2)

let shingles=Math.ceil((length*width)/30)

document.getElementById("materials").innerHTML=

"Studs: "+studs+
"<br>OSB: "+osb+
"<br>Concrete CY: "+concrete+
"<br>Shingles: "+shingles

document.getElementById("supplier").innerHTML=

studs+" Studs"+
"<br>"+osb+" OSB Sheets"+
"<br>"+concrete+" CY Concrete"+
"<br>"+shingles+" Shingles"

}

function addSub(){

let name=document.getElementById("subName").value
let trade=document.getElementById("subTrade").value
let bid=document.getElementById("subBid").value

subcontractors.push({name,trade,bid})

displaySubs()

}

function displaySubs(){

let html=""

subcontractors.forEach(s=>{

html+=

"<div class='project'>"+
s.name+" - "+s.trade+" - $"+s.bid+
"</div>"

})

document.getElementById("subs").innerHTML=html

}

function addTask(){

let task=document.getElementById("scheduleTask").value
let date=document.getElementById("scheduleDate").value

schedule.push({task,date})

displaySchedule()

}

function displaySchedule(){

let html=""

schedule.forEach(t=>{

html+=

"<div class='project'>"+
t.task+" - "+t.date+
"</div>"

})

document.getElementById("schedule").innerHTML=html

}

function generateInvoice(){

let p=estimateData

let text=

"INVOICE\n\n"+
"Client: "+p.client+"\n"+
"Project: "+p.project+"\n"+
"Bid Price: $"+p.bid

let blob=new Blob([text],{type:"text/plain"})

let link=document.createElement("a")

link.href=URL.createObjectURL(blob)

link.download="invoice.txt"

link.click()

}

function saveProject(){

let projects=JSON.parse(localStorage.getItem("projects")||"[]")

projects.push(estimateData)

localStorage.setItem("projects",JSON.stringify(projects))

loadProjects()

}

function loadProjects(){

let projects=JSON.parse(localStorage.getItem("projects")||"[]")

let html=""
let revenue=0
let profit=0

projects.forEach(p=>{

revenue+=p.bid
profit+=p.profit

html+=

"<div class='project'>"+
"<b>"+p.project+"</b><br>"+
p.client+"<br>"+
"$"+p.bid.toFixed(2)+" Bid"+
"</div>"

})

document.getElementById("projects").innerHTML=html

document.getElementById("dashboard").innerHTML=

"Projects: "+projects.length+
"<br>Total Revenue: $"+revenue.toFixed(2)+
"<br>Total Profit: $"+profit.toFixed(2)

}

loadProjects()

</script>

</body>

</html>
